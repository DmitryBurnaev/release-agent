{% extends "sqladmin/layout.html" %}
{% block head %}
{{ super() }}
<style>
    .analytics-frame {
        height: 90vh;
    }
</style>

{% endblock %}
{% block content %}
<iframe class="analytics-frame" id="analyticFrame" src="{{ iframe_link }}" frameborder="0"></iframe>
<script type="application/javascript">
    const analyticFrame = document.getElementById('analyticFrame');
    const statQueries = {{ stat_queries | default(none) | tojson }};

    function waitForElement(iframeDoc, selector, timeout = 10000, interval = 200) {
        return new Promise((resolve, reject) => {
            const startTime = Date.now();
            const checkElement = () => {
                const element = iframeDoc.querySelector(selector);
                if (element) {
                    resolve(element);
                } else if (Date.now() - startTime >= timeout) {
                    reject(new Error(`Element ${selector} not found within ${timeout}ms`));
                } else {
                    setTimeout(checkElement, interval);
                }
            };
            checkElement();
        });
    }

    analyticFrame.addEventListener('load', () => {
        try {
            const iframeWindow = analyticFrame.contentWindow;
            const iframeDoc = iframeWindow?.document;
            if (!iframeDoc) return;

            const inputURL = iframeDoc.getElementById('url');
            if (inputURL) {
                inputURL.value = window.location.origin + {{ proxy_path | tojson }};
            }

            const inputQuery = iframeDoc.getElementById('query');
            if (inputQuery) {
                inputQuery.value = {{ default_query | tojson }};
            }

            if (!Array.isArray(statQueries) || statQueries.length === 0) {
                return;
            }

            waitForElement(iframeDoc, '#mass-editor-textarea')
                .then(() => {
                    const massEditorTextarea = iframeDoc.getElementById('mass-editor-textarea');
                    if (massEditorTextarea) {
                        try {
                            let config = { params: {}, queries: [] };
                            const currentValue = massEditorTextarea.value.trim();
                            if (currentValue) {
                                config = JSON.parse(currentValue);
                            }

                            if (!config.params || typeof config.params !== 'object') {
                                config.params = {};
                            }

                            if (!config.queries || !Array.isArray(config.queries)) {
                                config.queries = [];
                            }

                            config.queries = statQueries;

                            massEditorTextarea.value = JSON.stringify(config, null, 2);
                            massEditorTextarea.dispatchEvent(new Event('input', { bubbles: true }));
                            massEditorTextarea.dispatchEvent(new Event('change', { bubbles: true }));

                            const submitButton = iframeDoc.getElementById('mass-editor-confirm');
                            if (submitButton) {
                                submitButton.click();
                            }
                        } catch (err) {
                            console.error("[Admin][Analytics] Failed to parse or update JSON:", err);
                        }
                    }
                })
                .catch((err) => {
                    console.warn("[Admin][Analytics] Mass editor textarea not found:", err);
                });

        } catch (err) {
            console.error("[Admin][Analytics] Failed to access iframe content or set input value:", err);
        }
    });
</script>
{% endblock %}
